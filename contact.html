<script>
function toggleMenu() {
  const links = document.querySelector('.nav-links');
  links.style.display = links.style.display === 'flex' ? 'none' : 'flex';
  links.style.flexDirection = 'column'; links.style.position = 'absolute';
  links.style.top = '70px'; links.style.left = '0'; links.style.right = '0';
  links.style.background = '#fff'; links.style.padding = '20px 24px';
  links.style.borderBottom = '1px solid #e2e6f0';
}
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
});

function submitContact() {
  const name = document.getElementById('cn-name').value.trim();
  const email = document.getElementById('cn-email').value.trim();
  const subject = document.getElementById('cn-subject').value.trim();
  const message = document.getElementById('cn-message').value.trim();
  const alertEl = document.getElementById('contact-alert');
  if (!name || !email || !subject || !message) {
    alertEl.innerHTML = '<div class="alert alert-error">Please fill in all required fields.</div>';
    return;
  }
  const msgs = JSON.parse(localStorage.getItem('cb_contact_messages') || '[]');
  msgs.push({ id: Date.now().toString(), name, email, type: document.getElementById('cn-type').value, subject, message, date: new Date().toISOString() });
  localStorage.setItem('cb_contact_messages', JSON.stringify(msgs));
  alertEl.innerHTML = '<div class="alert alert-success">Message sent! We will get back to you within 48 hours.</div>';
  document.getElementById('cn-name').value = ''; document.getElementById('cn-email').value = '';
  document.getElementById('cn-subject').value = ''; document.getElementById('cn-message').value = '';
}
</script>
